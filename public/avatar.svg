<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d5c8f0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f0e6ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e8d5f5;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="90" fill="url(#glow)"/>
  <!-- Stars decoration -->
  <text x="30" y="35" font-size="14" fill="#c39bd3" opacity="0.6">✦</text>
  <text x="160" y="45" font-size="10" fill="#c39bd3" opacity="0.5">✧</text>
  <text x="25" y="170" font-size="8" fill="#c39bd3" opacity="0.4">✦</text>
  <text x="170" y="160" font-size="12" fill="#c39bd3" opacity="0.5">✧</text>
  <!-- Cat face -->
  <text x="100" y="115" font-size="80" text-anchor="middle" dominant-baseline="central">🐱</text>
  <!-- Name -->
  <text x="100" y="175" font-size="16" font-family="sans-serif" font-weight="bold" fill="#7b3f96" text-anchor="middle">Astral</text>
  <text x="100" y="190" font-size="9" font-family="sans-serif" fill="#9b7fb8" text-anchor="middle">喵</text>
</svg>
